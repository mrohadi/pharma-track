name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Produces: v1.2.3, 1.2.3, 1.2, 1, latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.AUTH_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.AUTH_URL }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e

            IMAGE=ghcr.io/${{ github.repository }}:${{ needs.build-push.outputs.image_tag }}
            APP_DIR=/home/ec2-user/pharma-track
            COMPOSE="$APP_DIR/infra/docker-compose.prod.yml"

            # Write infra/.env entirely from GitHub Secrets.
            cat > "$APP_DIR/infra/.env" <<ENVEOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.AUTH_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.AUTH_URL }}
            APP_URL=${{ secrets.AUTH_URL }}
            PUBLIC_APP_URL=${{ secrets.AUTH_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            SES_FROM_EMAIL=${{ secrets.SES_FROM_EMAIL }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_REGION=${{ secrets.AWS_REGION }}
            WHATSAPP_ADAPTER=${{ secrets.WHATSAPP_ADAPTER }}
            WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
            WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }}
            WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }}
            WHATSAPP_APP_SECRET=${{ secrets.WHATSAPP_APP_SECRET }}
            NODE_ENV=production
            ENVEOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$IMAGE"

            cd "$APP_DIR"

            # Run DB migrations before swapping traffic
            WEB_IMAGE="$IMAGE" docker compose -f "$COMPOSE" --profile migrate run --rm migrator

            # Hot-swap web container only; keep postgres + redis running
            WEB_IMAGE="$IMAGE" docker compose -f "$COMPOSE" up -d --no-deps --wait web

            docker image prune -f
