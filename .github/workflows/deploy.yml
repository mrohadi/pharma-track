name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Produces: v1.2.3, 1.2.3, 1.2, 1, latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e

            IMAGE=ghcr.io/${{ github.repository }}:${{ needs.build-push.outputs.image_tag }}
            REPO=/opt/pharmatrack
            COMPOSE="$REPO/infra/docker-compose.prod.yml"

            # Normalise .env.prod → infra/.env (strips comments, blank lines,
            # and "export " prefix). docker compose reads .env from the compose
            # file's directory.
            sed -E '/^\s*#/d; /^\s*$/d; s/^\s*export\s+//' "$REPO/.env.prod" \
              | grep -E '^[A-Za-z_][A-Za-z0-9_]*=' \
              > "$REPO/infra/.env"

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker pull "$IMAGE"

            cd "$REPO"

            # Run DB migrations before swapping traffic
            WEB_IMAGE="$IMAGE" docker compose -f "$COMPOSE" run --rm migrator

            # Hot-swap web container only; keep postgres + redis running
            WEB_IMAGE="$IMAGE" docker compose -f "$COMPOSE" up -d --no-deps --wait web

            docker image prune -f
