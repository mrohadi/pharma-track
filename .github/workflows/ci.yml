name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pharmatrack
          POSTGRES_PASSWORD: pharmatrack
          POSTGRES_DB: pharmatrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pharmatrack -d pharmatrack"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://pharmatrack:pharmatrack@localhost:5432/pharmatrack
      AUTH_SECRET: ci-test-secret-not-used-anywhere-real

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
