<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PharmaTrack — UI Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1117; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 99px; }
  input, select, button, textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="pt-shared.jsx"></script>
<script type="text/babel" src="pt-landing.jsx"></script>
<script type="text/babel" src="pt-auth.jsx"></script>
<script type="text/babel" src="pt-admin.jsx"></script>
<script type="text/babel" src="pt-pharmacy.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="pt-driver.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "oklch(0.52 0.18 250)",
  "fontScale": 1,
  "sidebarColor": "oklch(0.18 0.06 200)",
  "darkDriver": false
}/*EDITMODE-END*/;

const VIEWS = [
  { id:'landing',  label:'🌐 Landing',  role:null },
  { id:'auth',     label:'🔐 Auth',     role:null },
  { id:'admin',    label:'🛡️ Admin',    role:'admin' },
  { id:'pharmacy', label:'🏥 Pharmacy', role:'pharmacy' },
  { id:'driver',   label:'🚴 Driver',   role:'driver' },
];

function ProtoNav({ current, onChange }) {
  return (
    <div style={{
      position:'fixed', top:0, left:0, right:0, zIndex:9999,
      height:44, background:'#0f1117',
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'0 16px', borderBottom:'1px solid rgba(255,255,255,0.07)',
      fontFamily:"'Plus Jakarta Sans',sans-serif",
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="9" fill="oklch(0.52 0.18 250)" opacity="0.2"/>
          <rect x="14.5" y="7" width="3.5" height="18" rx="1.75" fill="oklch(0.52 0.18 250)"/>
          <rect x="7" y="14.5" width="18" height="3.5" rx="1.75" fill="oklch(0.52 0.18 250)"/>
          <circle cx="23" cy="9.5" r="2.5" fill="oklch(0.52 0.15 195)"/>
        </svg>
        <span style={{ color:'rgba(255,255,255,0.5)', fontSize:11, fontWeight:600, letterSpacing:'0.04em', textTransform:'uppercase' }}>PharmaTrack</span>
        <span style={{ color:'rgba(255,255,255,0.2)', fontSize:11 }}>· prototype</span>
      </div>

      <div style={{ display:'flex', gap:3 }}>
        {VIEWS.map(v => (
          <button key={v.id} onClick={() => onChange(v.id)}
            style={{
              padding:'4px 14px', borderRadius:6, border:'none', cursor:'pointer',
              fontFamily:'inherit', fontSize:12, fontWeight:600,
              background: current===v.id ? 'rgba(255,255,255,0.12)' : 'transparent',
              color: current===v.id ? '#fff' : 'rgba(255,255,255,0.4)',
              transition:'all 0.15s',
            }}>
            {v.label}
          </button>
        ))}
      </div>
      <div style={{ fontSize:11, color:'rgba(255,255,255,0.2)', fontWeight:500 }}>Click a role to explore</div>
    </div>
  );
}

function TweaksPanel({ tweaks, setTweaks }) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  if (!open) return null;
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, zIndex:99999,
      background:'#fff', borderRadius:16, padding:20, width:260,
      boxShadow:'0 8px 40px rgba(0,0,0,0.18)', border:'1px solid #e5e7eb',
      fontFamily:"'Plus Jakarta Sans',sans-serif",
    }}>
      <div style={{ fontWeight:700, fontSize:14, color:'#111', marginBottom:16 }}>Tweaks</div>

      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <div>
          <label style={{ fontSize:12, fontWeight:600, color:'#555', display:'block', marginBottom:6 }}>Primary Color</label>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {[
              { label:'Blue',   val:'oklch(0.52 0.18 250)' },
              { label:'Teal',   val:'oklch(0.52 0.18 195)' },
              { label:'Green',  val:'oklch(0.52 0.15 145)' },
              { label:'Violet', val:'oklch(0.52 0.18 295)' },
            ].map(c => (
              <button key={c.label} onClick={() => update('primaryColor', c.val)}
                style={{ padding:'5px 10px', borderRadius:8, border:`2px solid ${tweaks.primaryColor===c.val?c.val:'#e5e7eb'}`, background: tweaks.primaryColor===c.val?`color-mix(in oklch,${c.val} 15%,white)`:'#f9f9f9', fontSize:12, fontWeight:600, cursor:'pointer', color:'#333', transition:'all 0.15s' }}>
                {c.label}
              </button>
            ))}
          </div>
        </div>

        <div>
          <label style={{ fontSize:12, fontWeight:600, color:'#555', display:'block', marginBottom:6 }}>Sidebar Tone</label>
          <div style={{ display:'flex', gap:8 }}>
            {[
              { label:'Dark Navy',  val:'oklch(0.15 0.04 255)' },
              { label:'Charcoal',   val:'oklch(0.18 0.01 250)' },
              { label:'Deep Teal',  val:'oklch(0.18 0.06 200)' },
            ].map(c => (
              <button key={c.label} onClick={() => update('sidebarColor', c.val)}
                style={{ padding:'5px 10px', borderRadius:8, border:`2px solid ${tweaks.sidebarColor===c.val?'#6366f1':'#e5e7eb'}`, background:'#f9f9f9', fontSize:11, fontWeight:600, cursor:'pointer', color:'#333' }}>
                {c.label}
              </button>
            ))}
          </div>
        </div>

        <div>
          <label style={{ fontSize:12, fontWeight:600, color:'#555', display:'block', marginBottom:6 }}>
            Font Scale: {tweaks.fontScale}×
          </label>
          <input type="range" min="0.85" max="1.2" step="0.05" value={tweaks.fontScale}
            onChange={e => update('fontScale', parseFloat(e.target.value))}
            style={{ width:'100%', accentColor: tweaks.primaryColor }}/>
        </div>

        <div>
          <label style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:12, fontWeight:600, color:'#555' }}>
            <input type="checkbox" checked={tweaks.darkDriver} onChange={e => update('darkDriver', e.target.checked)} style={{ accentColor: tweaks.primaryColor }}/>
            Driver: Dark Mode
          </label>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView]   = React.useState(() => localStorage.getItem('pt_view') || 'landing');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    localStorage.setItem('pt_view', view);
  }, [view]);

  // Apply tweaks as CSS variables
  React.useEffect(() => {
    document.documentElement.style.setProperty('--pt-primary', tweaks.primaryColor);
    document.documentElement.style.fontSize = `${tweaks.fontScale * 100}%`;
    if (window.PT) {
      PT.primary      = tweaks.primaryColor;
      PT.sidebar      = tweaks.sidebarColor;
      PT.primaryLight = `color-mix(in oklch, ${tweaks.primaryColor} 14%, white)`;
      PT.primaryText  = tweaks.primaryColor;
    }
  }, [tweaks]);

  const goAuth = () => setView('auth');

  return (
    <div style={{ paddingTop: 44, height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <ProtoNav current={view} onChange={setView}/>

      <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
        {view === 'landing' && (
          <div style={{ height:'100%', overflowY:'auto' }}>
            <LandingPage onGetStarted={goAuth}/>
          </div>
        )}

        {view === 'auth' && (
          <div style={{ height:'100%', overflowY:'auto' }}>
            <AuthPage onLogin={role => setView(role === 'driver' ? 'driver' : role === 'admin' ? 'admin' : 'pharmacy')}/>
          </div>
        )}

        {view === 'admin' && (
          <div style={{ height:'100%' }}>
            <AdminApp/>
          </div>
        )}

        {view === 'pharmacy' && (
          <div style={{ height:'100%' }}>
            <PharmacyApp/>
          </div>
        )}

        {view === 'driver' && (
          <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#0f1117', gap:32, overflow:'auto', padding:'20px 0' }}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
              <span style={{ color:'rgba(255,255,255,0.4)', fontSize:12, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' }}>Driver App</span>
              <IOSDevice width={390} height={800} dark={tweaks.darkDriver}>
                <DriverApp/>
              </IOSDevice>
            </div>
          </div>
        )}
      </div>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}/>
      <PTToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
